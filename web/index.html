<!DOCTYPE html><html><head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="TrailShare — Tracking GPS outdoor, mappe topografiche, Mountain Finder AR e community per escursioni, trail running e mountain bike in Italia.">
  <meta name="theme-color" content="#FC4C02">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TrailShare">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- 7.D2 — Open Graph + Twitter card per share social (link su WhatsApp,
       Facebook, Twitter). Per OG per-business (rifugio/noleggio) vedi
       roadmap futura: richiede Cloud Function SSR che intercetta i
       crawler su /b/{slug} e ritorna HTML statico con tag dinamici. -->
  <meta property="og:title" content="TrailShare — Outdoor GPS Italia">
  <meta property="og:description" content="Mappe topografiche, AR cime, tracking GPS, community e Spazi Pro (rifugi, noleggi, guide alpine) per escursioni in Italia.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://trailshare.app/og-default.png">
  <meta property="og:url" content="https://trailshare.app">
  <meta property="og:site_name" content="TrailShare">
  <meta property="og:locale" content="it_IT">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="TrailShare — Outdoor GPS Italia">
  <meta name="twitter:description" content="Mappe topografiche, AR cime, tracking GPS, community e Spazi Pro per escursioni in Italia.">
  <meta name="twitter:image" content="https://trailshare.app/og-default.png">

  <!-- 7.D2 — Schema.org JSON-LD generico (Organization TrailShare). Le
       singole entità Business diventeranno LocalBusiness via SSR. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "TrailShare",
    "url": "https://trailshare.app",
    "logo": "https://trailshare.app/icons/Icon-512.png",
    "description": "GPS Tracking per escursioni e trail running, mappe topografiche, AR riconoscimento cime, community outdoor e Spazi Pro per rifugi, noleggi e guide alpine in Italia.",
    "applicationCategory": "OutdoorApplication",
    "operatingSystem": "iOS, Android",
    "sameAs": [
      "https://www.instagram.com/trailshare",
      "https://www.facebook.com/trailshare"
    ]
  }
  </script>

  <title>TrailShare — Outdoor GPS Italia</title>
  <link rel="manifest" href="manifest.json">
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #ffffff;
      background-image: url("splash/img/light-background.png");
      background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #000000;
        background-image: url("splash/img/dark-background.png");
      }
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
</head>
<body>
  <script src="flutter_bootstrap.js" async=""></script>


</body></html>
