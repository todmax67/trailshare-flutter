<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TrailShare 3D</title>
  <link href="maplibre-gl.css" rel="stylesheet" />
  <script src="maplibre-gl.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0c1116; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    #err {
      position: absolute; top: 50%; left: 0; right: 0; transform: translateY(-50%);
      color: #fff; font-family: -apple-system, system-ui, sans-serif;
      text-align: center; padding: 24px; display: none;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="err"></div>
  <script>
    // ───────────────────────────────────────────────────────────────
    // Canale verso Flutter. Flutter registra un JavaScriptChannel
    // chiamato "TSChannel"; qui postiamo messaggi JSON.
    // ───────────────────────────────────────────────────────────────
    function post(obj) {
      try {
        if (window.TSChannel && window.TSChannel.postMessage) {
          window.TSChannel.postMessage(JSON.stringify(obj));
        }
      } catch (e) {}
    }
    function showError(msg) {
      var e = document.getElementById('err');
      e.style.display = 'block';
      e.textContent = msg;
      post({ type: 'error', message: msg });
    }

    var map = null;
    var trackCoords = [];      // [[lng,lat,ele?], ...]
    var cumDist = [];          // distanza cumulata in metri
    var totalDist = 0;
    var anim = null;           // requestAnimationFrame id
    var playing = false;
    var speed = 1.0;           // moltiplicatore velocità camera
    var progressT = 0;         // 0..1 posizione corrente lungo il path
    var lastFrameTs = 0;
    var pitch = 65, zoom = 15;
    // Durata "base" del fly-through a speed=1 (secondi). Scalata poi
    // dalla lunghezza per non rendere infinite le tracce lunghe.
    var BASE_DURATION_S = 40;
    var flyDurationS = BASE_DURATION_S;

    // Haversine in metri
    function dist(a, b) {
      var R = 6371000;
      var dLat = (b[1]-a[1]) * Math.PI/180;
      var dLng = (b[0]-a[0]) * Math.PI/180;
      var la1 = a[1]*Math.PI/180, la2 = b[1]*Math.PI/180;
      var h = Math.sin(dLat/2)*Math.sin(dLat/2) +
              Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)*Math.sin(dLng/2);
      return 2*R*Math.asin(Math.sqrt(h));
    }
    function bearing(a, b) {
      var y = Math.sin((b[0]-a[0])*Math.PI/180) * Math.cos(b[1]*Math.PI/180);
      var x = Math.cos(a[1]*Math.PI/180)*Math.sin(b[1]*Math.PI/180) -
              Math.sin(a[1]*Math.PI/180)*Math.cos(b[1]*Math.PI/180)*Math.cos((b[0]-a[0])*Math.PI/180);
      return (Math.atan2(y, x)*180/Math.PI + 360) % 360;
    }
    // Punto di destinazione dato origine [lng,lat], bearing (gradi) e
    // distanza (metri) — formula great-circle.
    function destPoint(origin, brgDeg, distM) {
      var R = 6371000;
      var d = distM / R;
      var brg = brgDeg * Math.PI/180;
      var lat1 = origin[1]*Math.PI/180, lng1 = origin[0]*Math.PI/180;
      var lat2 = Math.asin(Math.sin(lat1)*Math.cos(d) +
                 Math.cos(lat1)*Math.sin(d)*Math.cos(brg));
      var lng2 = lng1 + Math.atan2(Math.sin(brg)*Math.sin(d)*Math.cos(lat1),
                 Math.cos(d) - Math.sin(lat1)*Math.sin(lat2));
      return [lng2*180/Math.PI, lat2*180/Math.PI];
    }
    // Quota terreno (m s.l.m.) sotto un punto, con fallback.
    function terrainAt(p, fallback) {
      try {
        var e = map.queryTerrainElevation ? map.queryTerrainElevation({lng:p[0], lat:p[1]}) : null;
        return (e === null || e === undefined || isNaN(e)) ? fallback : e;
      } catch (err) { return fallback; }
    }
    // Posiziona la camera come "chase cam": l'occhio sta dietro il punto
    // corrente lungo il bearing, a un'altitudine SOPRA il terreno, e
    // guarda un punto poco più avanti. Così non entra mai nella montagna.
    // Parametri camera fly-over (jumpTo center+pitch+zoom, terrain-aware).
    // pitch 52 = vista dall'alto panoramica (non radente); zoom 13.2 =
    // camera ben sopra il rilievo, traccia centrata e leggibile.
    var CAM_PITCH = 52;
    var CAM_ZOOM = 13.2;
    var CAM_BACK_M = 350;    // (legacy chase-cam, non più usato)
    var CAM_HEIGHT_M = 220;  // (legacy chase-cam, non più usato)
    // Chase-cam: l'occhio sta dietro il cursore lungo il bearing, a
    // un'altezza COSTANTE sopra il terreno (segue la salita → il gap
    // resta uguale). L'inclinazione (pitch) è calcolata per puntare al
    // cursore alla sua quota reale, evitando il bug di lookAtPoint che
    // mirava a quota 0 (mare) → camera che guardava sottoterra.
    function setChaseCamera(curPos, brg, curEle) {
      var eye = destPoint(curPos, (brg + 180) % 360, CAM_BACK_M);
      // Quota terreno sotto il cursore: quota traccia (DEM) come base,
      // alzata alla terrain query se disponibile.
      var ground = curEle || 0;
      var tq = terrainAt(curPos, NaN);
      if (!isNaN(tq)) ground = Math.max(ground, tq);
      var eyeAlt = ground + CAM_HEIGHT_M;
      // pitch MapLibre: 0 = nadir (giù), 90 = orizzonte. L'angolo verso
      // il basso = atan(altezza/distanza); pitch = 90 - quell'angolo.
      var downAngle = Math.atan2(CAM_HEIGHT_M, CAM_BACK_M) * 180/Math.PI;
      var pitchDeg = 90 - downAngle;
      if (!window._camLogged) {
        window._camLogged = true;
        post({ type:'log', message: 'cam#1 ground='+Math.round(ground)+
              ' eyeAlt='+Math.round(eyeAlt)+' pitch='+Math.round(pitchDeg) });
      }
      try {
        var cam = map.getFreeCameraOptions();
        cam.position = maplibregl.MercatorCoordinate.fromLngLat(
          { lng: eye[0], lat: eye[1] }, eyeAlt);
        cam.setPitchBearing(pitchDeg, brg);
        map.setFreeCameraOptions(cam);
      } catch (err) {
        map.jumpTo({ center: curPos, bearing: brg, pitch: pitchDeg, zoom: 14 });
      }
    }

    function ele(c) { return (c.length > 2 && !isNaN(c[2])) ? c[2] : 0; }
    // Posizione interpolata lungo il path a frazione t (0..1).
    // Ritorna anche la quota interpolata (m s.l.m.).
    function pointAt(t) {
      if (trackCoords.length === 0) return null;
      if (t <= 0) return { pos: trackCoords[0], ele: ele(trackCoords[0]), idx: 0 };
      if (t >= 1) { var last = trackCoords[trackCoords.length-1];
        return { pos: last, ele: ele(last), idx: trackCoords.length-1 }; }
      var target = t * totalDist;
      // binary search sull'array cumDist
      var lo = 0, hi = cumDist.length-1;
      while (lo < hi) {
        var mid = (lo+hi)>>1;
        if (cumDist[mid] < target) lo = mid+1; else hi = mid;
      }
      var i = Math.max(1, lo);
      var d0 = cumDist[i-1], d1 = cumDist[i];
      var seg = d1 - d0;
      var f = seg > 0 ? (target - d0)/seg : 0;
      var p0 = trackCoords[i-1], p1 = trackCoords[i];
      return {
        pos: [ p0[0]+(p1[0]-p0[0])*f, p0[1]+(p1[1]-p0[1])*f ],
        ele: ele(p0) + (ele(p1)-ele(p0))*f,
        idx: i
      };
    }

    // ───────────────────────────────────────────────────────────────
    // API chiamata da Flutter
    // ───────────────────────────────────────────────────────────────
    window.tsInit = function(maptilerKey) {
      try {
        var styleUrl = 'https://api.maptiler.com/maps/hybrid/style.json?key=' + maptilerKey;
        map = new maplibregl.Map({
          container: 'map',
          style: styleUrl,
          center: [10.5, 45.9],
          zoom: 10,
          pitch: 0,
          bearing: 0,
          attributionControl: false,
          maxPitch: 80
        });
        map.on('load', function() {
          post({ type: 'log', message: 'map load fired' });
          // Terrain 3D — racchiuso in try/catch così un eventuale
          // fallimento (tile-dem 403, source non pronta) NON blocca il
          // flusso: postiamo comunque 'ready' e la mappa resta 2.5D.
          try {
            map.addSource('terrainSource', {
              type: 'raster-dem',
              url: 'https://api.maptiler.com/tiles/terrain-rgb-v2/tiles.json?key=' + maptilerKey
            });
            map.setTerrain({ source: 'terrainSource', exaggeration: 1.3 });
            post({ type: 'log', message: 'terrain set' });
          } catch (e) {
            post({ type: 'log', message: 'terrain fallito: ' + e.message });
          }
          try {
            map.setSky({
              'sky-color': '#a9d1ff', 'horizon-color': '#dfeaf6',
              'fog-color': '#e8eef5', 'fog-ground-blend': 0.6,
              'sky-horizon-blend': 0.6
            });
          } catch (e) {}
          post({ type: 'ready' });
        });
        // Watchdog: se 'load' non scatta entro 9s, segnala (di solito
        // significa style.json non raggiungibile o key non valida).
        setTimeout(function() {
          if (!map || !map.isStyleLoaded()) {
            post({ type: 'log', message: 'WATCHDOG: style non caricato dopo 9s' });
          }
        }, 9000);
        map.on('error', function(e) {
          // Errori tile non fatali: logghiamo soltanto.
          post({ type: 'log', message: 'maperror: ' + ((e && e.error && e.error.message) || 'sconosciuto') });
        });
      } catch (e) {
        showError('Init 3D fallito: ' + e.message);
      }
    };

    window.tsLoadTrack = function(geojsonStr) {
      try {
        var gj = JSON.parse(geojsonStr);
        var coords = gj.coordinates || (gj.geometry && gj.geometry.coordinates) || [];
        if (!coords.length) { showError('Traccia senza punti'); return; }
        trackCoords = coords;
        // Precalcola distanze cumulate
        cumDist = [0]; totalDist = 0;
        for (var i=1; i<trackCoords.length; i++) {
          totalDist += dist(trackCoords[i-1], trackCoords[i]);
          cumDist.push(totalDist);
        }
        // Durata fly-through proporzionale alla lunghezza (clamp 25-70s)
        var km = totalDist/1000;
        flyDurationS = Math.max(25, Math.min(70, BASE_DURATION_S * Math.sqrt(km/5)));

        // Diagnostica quote: se min/max ele sono ~0 la traccia non ha
        // elevazione → la camera userà solo queryTerrainElevation.
        var eMin = Infinity, eMax = -Infinity;
        for (var k=0; k<trackCoords.length; k++) {
          var z = ele(trackCoords[k]);
          if (z < eMin) eMin = z; if (z > eMax) eMax = z;
        }
        post({ type:'log', message: 'quote traccia: min='+Math.round(eMin)+
              ' max='+Math.round(eMax)+' n='+trackCoords.length });

        // Sorgente + layer linea traccia
        var lineGeo = { type:'Feature', geometry:{ type:'LineString', coordinates: trackCoords } };
        if (map.getSource('track')) {
          map.getSource('track').setData(lineGeo);
        } else {
          map.addSource('track', { type:'geojson', data: lineGeo });
          map.addLayer({
            id:'track-glow', type:'line', source:'track',
            layout:{ 'line-cap':'round', 'line-join':'round' },
            paint:{ 'line-color':'#E07B4C', 'line-width':10, 'line-opacity':0.25, 'line-blur':4 }
          });
          map.addLayer({
            id:'track-line', type:'line', source:'track',
            layout:{ 'line-cap':'round', 'line-join':'round' },
            paint:{ 'line-color':'#E07B4C', 'line-width':4 }
          });
          // Marker start/end
          map.addSource('endpoints', { type:'geojson', data:{ type:'FeatureCollection', features:[
            { type:'Feature', properties:{ kind:'start' }, geometry:{ type:'Point', coordinates: trackCoords[0] } },
            { type:'Feature', properties:{ kind:'end' }, geometry:{ type:'Point', coordinates: trackCoords[trackCoords.length-1] } }
          ]}});
          map.addLayer({ id:'pts', type:'circle', source:'endpoints', paint:{
            'circle-radius':6,
            'circle-color':['match',['get','kind'],'start','#2E7D32','#C62828'],
            'circle-stroke-width':2, 'circle-stroke-color':'#fff'
          }});

          // Cursore "tu sei qui": alone + pallino bianco bordato arancione,
          // aggiornato a ogni frame del fly-through.
          map.addSource('cursor', { type:'geojson', data:{
            type:'Feature', geometry:{ type:'Point', coordinates: trackCoords[0] } } });
          map.addLayer({ id:'cursor-halo', type:'circle', source:'cursor', paint:{
            'circle-radius':16, 'circle-color':'#E07B4C', 'circle-opacity':0.30,
            'circle-blur':0.4
          }});
          map.addLayer({ id:'cursor-dot', type:'circle', source:'cursor', paint:{
            'circle-radius':7, 'circle-color':'#ffffff',
            'circle-stroke-width':3, 'circle-stroke-color':'#E07B4C'
          }});
        }
        // Posiziona il cursore all'inizio a ogni (ri)caricamento traccia.
        if (map.getSource('cursor')) {
          map.getSource('cursor').setData({
            type:'Feature', geometry:{ type:'Point', coordinates: trackCoords[0] } });
        }

        // Inquadra la traccia con un po' di pitch (preview interattiva)
        var b = trackCoords.reduce(function(acc, c){
          return [Math.min(acc[0],c[0]), Math.min(acc[1],c[1]),
                  Math.max(acc[2],c[0]), Math.max(acc[3],c[1])];
        }, [180,90,-180,-90]);
        map.fitBounds([[b[0],b[1]],[b[2],b[3]]], { padding: 60, pitch: 45, duration: 1200 });

        post({ type:'trackLoaded', distanceKm: +(km.toFixed(2)), durationS: Math.round(flyDurationS) });
      } catch (e) {
        showError('Caricamento traccia fallito: ' + e.message);
      }
    };

    function frame(ts) {
      if (!playing) return;
      if (!lastFrameTs) lastFrameTs = ts;
      var dt = (ts - lastFrameTs)/1000; // secondi
      lastFrameTs = ts;
      progressT += (dt * speed) / flyDurationS;
      if (progressT >= 1) { progressT = 1; }

      var p = pointAt(progressT);
      if (p) {
        // bearing verso un punto poco più avanti (lookahead)
        var look = pointAt(Math.min(1, progressT + 0.02));
        var lookPos = (look && look.pos) ? look.pos : p.pos;
        var brg = bearing(p.pos, lookPos);
        // Camera fly-over con jumpTo (terrain-aware e robusto, niente
        // FreeCamera che dava problemi di sync → partenza fuori traccia).
        // Centro sul cursore; pitch 52 + zoom 13.2 = vista dall'alto
        // panoramica con la traccia centrata e ben leggibile.
        map.jumpTo({ center: p.pos, bearing: brg, pitch: CAM_PITCH, zoom: CAM_ZOOM });
        // Aggiorna il cursore "tu sei qui" alla posizione corrente.
        if (map.getSource('cursor')) {
          map.getSource('cursor').setData({
            type:'Feature', geometry:{ type:'Point', coordinates: p.pos } });
        }
        post({ type:'progress', t: progressT });
      }

      if (progressT >= 1) {
        playing = false;
        post({ type:'ended' });
        return;
      }
      anim = requestAnimationFrame(frame);
    }

    window.tsPlay = function() {
      if (!map || trackCoords.length === 0) return;
      if (progressT >= 1) progressT = 0; // replay dall'inizio
      post({ type:'playing' });

      var p0 = pointAt(progressT);
      var look0 = pointAt(Math.min(1, progressT + 0.02));
      var brg0 = (look0 && look0.pos) ? bearing(p0.pos, look0.pos) : 0;

      // FONDAMENTALE: ferma qualsiasi animazione in corso (es. il
      // fitBounds dell'apertura) e riposiziona la camera in modo PULITO
      // sul punto di partenza. Senza map.stop()+jumpTo, la prima
      // setFreeCameraOptions non si applicava (transform non
      // sincronizzato → il fly partiva fuori traccia finché non si
      // muoveva la mappa a mano).
      map.stop();
      map.jumpTo({ center: p0.pos, bearing: brg0, pitch: CAM_PITCH, zoom: CAM_ZOOM });

      playing = true;
      lastFrameTs = 0;

      // Al primo avvio attende che i tile terrain siano pronti (idle)
      // o max 900ms, poi anima. Dopo, parte subito.
      if (!window._warmedUp) {
        window._warmedUp = true;
        var started = false;
        var startAnim = function() {
          if (started) return; started = true;
          lastFrameTs = 0;
          anim = requestAnimationFrame(frame);
        };
        map.once('idle', startAnim);
        setTimeout(startAnim, 900);
        return;
      }
      anim = requestAnimationFrame(frame);
    };
    window.tsPause = function() {
      playing = false;
      if (anim) cancelAnimationFrame(anim);
      post({ type:'paused' });
    };
    window.tsReset = function() {
      window.tsPause();
      progressT = 0;
      if (map.getSource('cursor') && trackCoords.length) {
        map.getSource('cursor').setData({
          type:'Feature', geometry:{ type:'Point', coordinates: trackCoords[0] } });
      }
      if (trackCoords.length) {
        var b = trackCoords.reduce(function(acc, c){
          return [Math.min(acc[0],c[0]), Math.min(acc[1],c[1]),
                  Math.max(acc[2],c[0]), Math.max(acc[3],c[1])];
        }, [180,90,-180,-90]);
        map.fitBounds([[b[0],b[1]],[b[2],b[3]]], { padding: 60, pitch: 45, duration: 1000 });
      }
      post({ type:'reset' });
    };
    window.tsSetSpeed = function(x) { speed = Math.max(0.25, Math.min(4, x)); };
    window.tsSetExaggeration = function(x) {
      try { map.setTerrain({ source:'terrainSource', exaggeration: Math.max(1, Math.min(2.5, x)) }); } catch(e){}
    };

    // Segnala a Flutter che il bridge JS è pronto a ricevere tsInit.
    post({ type:'bridgeReady' });
  </script>
</body>
</html>
